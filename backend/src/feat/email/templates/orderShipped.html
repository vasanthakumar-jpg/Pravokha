<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Order Shipped</title>
    <style>
        body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body, table, td, p, a { font-family: Arial, Helvetica, sans-serif; }
        .email-container { max-width: 600px; margin: 0 auto; }
        .header { background-color: #F59E0B; color: #ffffff; padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0;font-size: 28px; font-weight: bold; }
        .content { background-color: #f9fafb; padding: 30px 20px; }
        .card { background-color: #ffffff; padding: 20px; margin: 20px 0; border-radius: 8px; border: 1px solid #e5e7eb; }
        .button { display: inline-block; padding: 14px 28px; background-color: #F59E0B; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 16px; }
        .button:hover { background-color: #D97706; }
        .footer { text-align: center; padding: 20px; color: #6b7280; font-size: 14px; }
        
        @media only screen and (max-width: 480px) {
            .email-container { width: 100% !important; }
            .content { padding: 20px 15px !important; }
            .card { padding: 15px !important; }
            .header h1 { font-size: 24px !important; }
            .button { padding: 12px 24px !important; font-size: 14px !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f3f4f6;">
    <table role="presentation" style="width: 100%; border: 0;" cellspacing="0" cellpadding="0">
        <tr>
            <td style="padding: 20px 0;">
                <table role="presentation" class="email-container" style="width: 100%; max-width: 600px; margin: 0 auto; background-color: #ffffff;">
                    
                    <tr>
                        <td class="header">
                            <h1>📦 Your Order Has Shipped!</h1>
                        </td>
                    </tr>
                    
                    <tr>
                        <td class="content">
                            <p style="font-size: 16px; color: #111827; margin: 0 0 15px 0;">Hello <strong>{{customerName}}</strong>,</p>
                            <p style="font-size: 16px; color: #374151; margin: 0 0 20px 0;">Great news! Your order is on its way.</p>
                            
                            <div class="card">
                                <h2 style="margin: 0 0 15px 0; font-size: 20px; color: #111827;">Shipping Details</h2>
                                <p style="margin: 8px 0; color: #374151;"><strong>Order Number:</strong> {{orderNumber}}</p>
                                <p style="margin: 8px 0; color: #374151;"><strong>Tracking Number:</strong> {{trackingNumber}}</p>
                                <p style="margin: 8px 0; color: #374151;"><strong>Courier:</strong> {{courierName}}</p>
                            </div>
                            
                            <table role="presentation" style="width: 100%; margin: 20px 0;">
                                <tr>
                                    <td style="text-align: center;">
                                        <a href="{{trackingUrl}}" class="button">Track Your Order</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <tr>
                        <td class="footer">
                            <p style="margin: 10px 0; font-weight: bold; color: #111827;">Pravokha</p>
                            <p>© 2026 Pravokha. All rights reserved.</p>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
