<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Approval</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #8B5CF6; color: white; padding: 20px; text-align: center; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .button { display: inline-block; padding: 12px 24px; background-color: #8B5CF6; color: white; text-decoration: none; border-radius: 5px; margin: 10px 0; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Congratulations!</h1>
    </div>
    <div class="content">
        <p>Hello {{sellerName}},</p>
        <p>Great news! Your seller account for <strong>{{storeName}}</strong> has been approved!</p>
        
        <p>You can now start listing your products and selling on Pravokha.</p>
        
        <p style="text-align: center;">
            <a href="{{dashboardUrl}}" class="button">Go to Seller Dashboard</a>
        </p>
    </div>
    <div class="footer">
        <p>© 2026 Pravokha. All rights reserved.</p>
    </div>
</body>
</html>
