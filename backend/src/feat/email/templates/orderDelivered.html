<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Delivered</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #10B981; color: white; padding: 20px; text-align: center; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .checkmark { font-size: 48px; text-align: center; margin: 20px 0; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Order Delivered!</h1>
    </div>
    <div class="content">
        <div class="checkmark">📦✓</div>
        <p>Hello {{customerName}},</p>
        <p>Your order <strong>{{orderNumber}}</strong> has been delivered on {{deliveryDate}}.</p>
        <p>We hope you love your purchase! If you have any issues, please contact our support team.</p>
    </div>
    <div class="footer">
        <p>© 2026 Pravokha. All rights reserved.</p>
    </div>
</body>
</html>
